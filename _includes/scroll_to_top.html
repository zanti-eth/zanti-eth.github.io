<!-- Scroll to Top Button -->
<button onclick="scrollToTop()" id="scrollTopBtn" title="Back to top" aria-label="Scroll to Top">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
    <path d="M12 4L6 10H10V20H14V10H18L12 4Z" fill="#00FF00"/>
  </svg>
</button>

<style>
#scrollTopBtn {
  position: fixed;
  bottom: 30px;
  right: 30px;
  z-index: 999;
  background-color: #111;
  border: 1px dashed #333;
  border-radius: 50%;
  padding: 12px;
  cursor: pointer;
  opacity: 0;
  transition: opacity 0.3s ease-in-out, transform 0.3s ease;
  animation: none;
}
#scrollTopBtn:hover {
  background-color: #222;
  transform: scale(1.1);
}
#scrollTopBtn svg {
  display: block;
}
#scrollTopBtn.show {
  opacity: 1;
  animation: pulse 1.5s infinite;
}
@keyframes pulse {
  0% { box-shadow: 0 0 0px #0f0; }
  50% { box-shadow: 0 0 10px #0f0; }
  100% { box-shadow: 0 0 0px #0f0; }
}
</style>

<script>
window.onscroll = function() {
  const btn = document.getElementById("scrollTopBtn");
  if (document.body.scrollTop > 200 || document.documentElement.scrollTop > 200) {
    btn.classList.add("show");
  } else {
    btn.classList.remove("show");
  }
};
function scrollToTop() {
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
